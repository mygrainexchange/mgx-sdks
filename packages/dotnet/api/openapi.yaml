      security:
      - oauth2:
        - farms.write
      summary: Update a farm
      tags:
      - Listings
components:
  parameters:
    UnitsParam:
      description: "Unit for quantity values (and price values on market endpoints):\
        \ mt (default), t = US short ton, bu = commodity-specific bushels, lb, kg.\
        \ Bushel views require a single-commodity context."
      explode: true
      in: query
      name: units
      required: false
      schema:
        enum:
        - mt
        - t
        - bu
        - lb
        - kg
        type: string
      style: form
  responses:
    Unauthorized:
      content:
        application/json:
          example:
            error:
              status: 401
              code: unauthenticated
              message: Missing or expired token.
          schema:
            $ref: "#/components/schemas/Error"
      description: Missing or invalid token
    Forbidden:
      content:
        application/json:
          example:
            error:
              status: 403
              code: insufficient_scope
              message: This token is missing the required scope.
          schema:
            $ref: "#/components/schemas/Error"
      description: Token lacks the required scope or eligibility
    NotFound:
      content:
        application/json:
          example:
            error:
              status: 404
              code: not_found
              message: Resource not found.
          schema:
            $ref: "#/components/schemas/Error"
      description: Resource not found
    ValidationError:
      content:
        application/json:
          example:
            error:
              status: 422
              code: validation_failed
              message: The given data was invalid.
              errors:
              - field: quantity_mt
                message: The quantity mt must be at least 0.01.
          schema:
            $ref: "#/components/schemas/Error"
      description: Request failed validation
    Error:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
      description: Error
  schemas:
    Error:
      example:
        error:
          code: validation_failed
          message: message
          errors:
          - field: field
            message: message
          - field: field
            message: message
          status: 422
      properties:
        error:
          $ref: "#/components/schemas/Error_error"
      type: object
    Deleted:
      example:
        data:
          deleted: true
          id: id
      properties:
        data:
          $ref: "#/components/schemas/Deleted_data"
      type: object
    Money:
      example:
        firm: true
        amount: 312.5
        unit: MT
        currency: CAD
      properties:
        amount:
          example: 312.5
          type: number
        currency:
          example: CAD
          type: string
        unit:
          example: MT
          type: string
        firm:
          description: Present on asking prices; true when the price is firm.
          nullable: true
          type: boolean
      type: object
    Commodity:
      example:
        name: Wheat
        slug: wheat
      properties:
        slug:
          example: wheat
          type: string
        name:
          example: Wheat
          type: string
      type: object
    Quality:
      description: Non-identifying seller quality claims. All fields are optional.
      example:
        dockage: 6.027456183070403
        protein: 13.8
        test_weight: 0.8008281904610115
        falling_number: 1.4658129805029452
        moisture: 12.1
      properties:
        protein:
          example: 13.8
          nullable: true
          type: number
        moisture:
          example: 12.1
          nullable: true
          type: number
        test_weight:
          nullable: true
          type: number
        dockage:
          nullable: true
          type: number
        falling_number:
          nullable: true
          type: number
      type: object
    Location:
      description: Coarse location only — province + nearest city. Never the farm
        name or exact coordinates.
      properties:
        province:
          example: SK
          type: string
        nearest_city:
          example: Saskatoon
          type: string
