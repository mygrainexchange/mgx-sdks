        schema:
          enum:
          - listed
          - unlisted
          - archived
          type: string
        style: form
      - description: "Unit for quantity values (and price values on market endpoints):\
          \ mt (default), t = US short ton, bu = commodity-specific bushels, lb, kg.\
          \ Bushel views require a single-commodity context."
        explode: true
        in: query
        name: units
        required: false
        schema:
          enum:
          - mt
          - t
          - bu
          - lb
          - kg
          type: string
        style: form
      responses:
        "200":
          description: Paging object of the seller's own listings (full detail)
      security:
      - oauth2:
        - listings.read
      summary: Your own inventory listings
      tags:
      - Listings
    post:
      description: "Creates a listing via the same core the MGX app uses. When list\
        \ is true (default) it is published to the public anonymized marketplace immediately.\
        \ Requires a valid payment method on file with MGX, and the listings.* scopes\
        \ which are granted to approved partners (not self-service). The seller stays\
        \ anonymous to all buyers until a trade settles."
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlaceListing"
        required: true
      responses:
        "201":
          description: Listing created (seller's full own view)
        "422":
          $ref: "#/components/responses/Error"
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: "No payment method on file, or the client is not an approved\
            \ partner for listings access"
      security:
      - oauth2:
        - listings.write
      summary: Submit inventory (anonymized to buyers)
      tags:
      - Listings
  /me/inventory/{id}:
    delete:
      parameters:
      - explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          description: Archived
        "404":
          $ref: "#/components/responses/NotFound"
      security:
      - oauth2:
        - listings.write
      summary: Archive a listing
      tags:
      - Listings
    get:
      parameters:
      - explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      - description: "Unit for quantity values (and price values on market endpoints):\
          \ mt (default), t = US short ton, bu = commodity-specific bushels, lb, kg.\
          \ Bushel views require a single-commodity context."
        explode: true
        in: query
        name: units
        required: false
        schema:
          enum:
          - mt
          - t
          - bu
          - lb
          - kg
          type: string
        style: form
      responses:
        "200":
          description: Listing detail
        "404":
          $ref: "#/components/responses/NotFound"
      security:
      - oauth2:
        - listings.read
      summary: Get one of your listings
      tags:
      - Listings
    patch:
      parameters:
      - explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          description: Updated listing
        "404":
          $ref: "#/components/responses/NotFound"
      security:
      - oauth2:
        - listings.write
      summary: "Update a listing (price, quantity, list/unlist)"
      tags:
      - Listings
  /me/inventory/{id}/bids:
    get:
      description: "Bids buyers placed on your listing. The buyer stays masked until\
