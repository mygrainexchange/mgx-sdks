      parameters:
      - explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      - explode: true
        in: query
        name: status
        required: false
        schema:
          type: string
        style: form
      responses:
        "200":
          description: Paging object of received bids
        "404":
          $ref: "#/components/responses/NotFound"
      security:
      - oauth2:
        - listings.read
      summary: Bids received on a listing
      tags:
      - Listings
  /me/farms/{id}:
    get:
      parameters:
      - explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          description: Farm detail
        "404":
          $ref: "#/components/responses/NotFound"
      security:
