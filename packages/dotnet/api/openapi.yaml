openapi: 3.0.3
info:
  contact:
    name: MGX Developer Support
    url: https://developers.mygrainexchange.com
  description: "Public REST API for grain elevators and enterprise buyers. Browse\
    \ anonymized inventory, place bids, read your team's trades and bids, manage cash\
    \ bids, subscribe to webhooks, and read market prices. Authenticate with OAuth2\
    \ (Login with MGX). Seller identity is never exposed until a trade is paid on\
    \ both sides."
  title: MGX Enterprise API
  version: 1.0.0
servers:
- description: Production
  url: https://api.mygrainexchange.com/v1
- description: Local (Herd)
  url: https://dashboard.mgx.test/v1
security:
- oauth2:
  - inventory.read
tags:
- description: Browse and filter anonymized grain listings.
  name: Inventory
- description: "Commodity reference data, current and historical prices."
  name: Market
- description: "Place bids, read your team's bids, and act on counter-offers."
  name: Bids
- description: Read your team's own completed trades.
  name: Trades
- description: Read the teams the authenticated user belongs to.
  name: Teams
- description: Manage the elevator's own cash bids and their offers.
  name: Cash Bids
- description: Subscribe to event notifications and inspect deliveries.
  name: Webhooks
paths:
  /inventory:
    get:
      description: "Returns a paged, anonymized list of grain listings. Seller identity,\
        \ farm name, and exact coordinates are never included."
      operationId: inventoryList
      parameters:
      - description: "Commodity slug(s), comma-separated, e.g. wheat,canola."
        explode: true
        in: query
        name: commodity
        required: false
        schema:
          type: string
        style: form
      - description: "Grade code, e.g. 1CWRS."
        explode: true
        in: query
        name: grade
        required: false
        schema:
          type: string
        style: form
      - description: Minimum tonnes (MT). Interpreted in `?units=` (default MT).
        explode: true
        in: query
        name: min_quantity
        required: false
        schema:
          type: number
        style: form
      - description: Maximum tonnes (MT). Interpreted in `?units=` (default MT).
        explode: true
        in: query
        name: max_quantity
        required: false
        schema:
          type: number
        style: form
      - description: "Coarse location filter, e.g. SK, AB."
        explode: true
        in: query
        name: province
        required: false
        schema:
          type: string
        style: form
      - description: "lat,lng,radius_km — radius search against coarse city centroids."
        explode: true
        in: query
        name: near
        required: false
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: crop_year
        required: false
        schema:
          type: integer
        style: form
      - explode: true
        in: query
        name: is_organic
        required: false
        schema:
          type: boolean
        style: form
      - explode: true
        in: query
        name: min_protein
        required: false
        schema:
          type: number
        style: form
      - explode: true
        in: query
        name: sort
        required: false
        schema:
          enum:
          - price
          - -price
          - quantity
          - -quantity
          - listed_at
          - -listed_at
          type: string
        style: form
      - explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 20
          maximum: 50
          minimum: 1
          type: integer
        style: form
      - explode: true
        in: query
        name: offset
        required: false
        schema:
          default: 0
          minimum: 0
          type: integer
        style: form
      - description: "Unit for quantity values (and price values on market endpoints):\
          \ mt (default), t = US short ton, bu = commodity-specific bushels, lb, kg.\
          \ Bushel views require a single-commodity context."
        explode: true
        in: query
        name: units
        required: false
        schema:
          enum:
          - mt
          - t
          - bu
          - lb
          - kg
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryPage"
          description: Paging object of inventory
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
      security:
      - oauth2:
        - inventory.read
      summary: Browse & filter anonymized inventory
      tags:
      - Inventory
  /inventory/filters:
    get:
      description: "Returns the distinct commodities, grades, provinces, and crop\
        \ years currently available."
      operationId: inventoryFilters
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryFilters"
          description: Available filter facets
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
      security:
      - oauth2:
        - inventory.read
      summary: Facet metadata for filters
      tags:
      - Inventory
  /inventory/{id}:
    get:
      operationId: inventoryGet
      parameters:
      - description: "Public inventory id, e.g. inv_3Kd9aZ."
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      - description: "Unit for quantity values (and price values on market endpoints):\
          \ mt (default), t = US short ton, bu = commodity-specific bushels, lb, kg.\
          \ Bushel views require a single-commodity context."
        explode: true
        in: query
        name: units
        required: false
        schema:
          enum:
          - mt
          - t
          - bu
          - lb
          - kg
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryEnvelope"
          description: Inventory resource
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
      security:
      - oauth2:
        - inventory.read
      summary: Get one anonymized listing
      tags:
      - Inventory
  /inventory/{id}/bids:
    post:
      description: Places a bid on behalf of the authenticated user's team. Requires
        a user-context (authorization-code) token bound to a team. Send an Idempotency-Key
        header to make retries safe.
      operationId: bidPlace
      parameters:
      - description: Public inventory id.
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      - description: Same key + identical body returns the original bid (201); a different
          body returns 409.
        explode: false
        in: header
        name: Idempotency-Key
        required: false
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlaceBid"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BidEnvelope"
          description: Bid created
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Error"
        "422":
          $ref: "#/components/responses/ValidationError"
      security:
      - oauth2:
        - bids.write
      summary: Place a bid on a listing
      tags:
      - Bids
  /bids:
    get:
      operationId: bidList
      parameters:
      - explode: true
        in: query
        name: status
        required: false
        schema:
          enum:
          - pending
          - accepted
          - rejected
          - countered
          - expired
          type: string
        style: form
      - explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 20
          maximum: 50
          minimum: 1
          type: integer
        style: form
      - explode: true
        in: query
        name: offset
        required: false
        schema:
          default: 0
          minimum: 0
          type: integer
        style: form
      - description: "Unit for quantity values (and price values on market endpoints):\
          \ mt (default), t = US short ton, bu = commodity-specific bushels, lb, kg.\
          \ Bushel views require a single-commodity context."
        explode: true
        in: query
        name: units
        required: false
        schema:
          enum:
          - mt
          - t
          - bu
          - lb
          - kg
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BidPage"
          description: Paging object of bids
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
      security:
      - oauth2:
        - bids.read
      summary: List the team's own bids
      tags:
      - Bids
  /bids/{id}:
    get:
      operationId: bidGet
      parameters:
      - description: "Public bid id, e.g. bid_7Qp2."
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      - description: "Unit for quantity values (and price values on market endpoints):\
          \ mt (default), t = US short ton, bu = commodity-specific bushels, lb, kg.\
          \ Bushel views require a single-commodity context."
        explode: true
        in: query
        name: units
        required: false
        schema:
          enum:
          - mt
          - t
          - bu
          - lb
          - kg
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BidEnvelope"
          description: Bid resource
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
      security:
      - oauth2:
        - bids.read
      summary: Get one of the team's bids
      tags:
      - Bids
  /bids/{id}/accept:
    post:
      description: Accepts a counter-offer on one of the team's bids; creates a trade.
      operationId: bidAccept
      parameters:
      - explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TradeEnvelope"
          description: Bid accepted; trade created
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/Error"
      security:
      - oauth2:
        - bids.write
      summary: Accept a counter-offer
      tags:
      - Bids
  /bids/{id}/reject:
    post:
      operationId: bidReject
      parameters:
      - explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BidEnvelope"
          description: Bid rejected
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
      security:
      - oauth2:
        - bids.write
      summary: Reject a counter-offer
      tags:
      - Bids
  /bids/{id}/counter:
    post:
      operationId: bidCounter
      parameters:
      - explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlaceBid"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BidEnvelope"
          description: Counter created
        "409":
          $ref: "#/components/responses/Error"
        "422":
          $ref: "#/components/responses/ValidationError"
      security:
      - oauth2:
        - bids.write
      summary: Counter a bid
      tags:
      - Bids
  /market/commodities:
    get:
      operationId: marketCommodities
      parameters:
      - description: "Unit for quantity values (and price values on market endpoints):\
          \ mt (default), t = US short ton, bu = commodity-specific bushels, lb, kg.\
          \ Bushel views require a single-commodity context."
        explode: true
        in: query
        name: units
        required: false
        schema:
          enum:
          - mt
          - t
          - bu
          - lb
          - kg
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketCommodityList"
          description: List of commodities
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
      security:
      - oauth2:
        - market.read
      summary: Commodities with market-price coverage
      tags:
      - Market
  /market/prices:
    get:
      operationId: marketPrices
      parameters:
      - description: "Commodity slug(s), comma-separated."
        explode: true
        in: query
        name: commodity
        required: false
        schema:
          type: string
        style: form
      - description: Returns the price as-of that date instead of the current price.
        explode: true
        in: query
        name: date
        required: false
        schema:
          format: date
          type: string
        style: form
      - description: "Unit for quantity values (and price values on market endpoints):\
          \ mt (default), t = US short ton, bu = commodity-specific bushels, lb, kg.\
          \ Bushel views require a single-commodity context."
        explode: true
        in: query
        name: units
        required: false
        schema:
          enum:
          - mt
          - t
          - bu
          - lb
          - kg
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketPriceList"
          description: Prices per commodity
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
      security:
      - oauth2:
        - market.read
      summary: "Market prices, current or as-of a date"
      tags:
      - Market
  /market/prices/{commodity}/history:
    get:
      operationId: marketHistory
      parameters:
      - description: "Commodity slug, e.g. wheat."
        explode: false
        in: path
        name: commodity
        required: true
        schema:
          type: string
        style: simple
      - explode: true
        in: query
        name: from
        required: false
        schema:
          format: date
          type: string
        style: form
      - explode: true
        in: query
        name: to
        required: false
        schema:
          format: date
          type: string
        style: form
      - explode: true
        in: query
        name: interval
        required: false
        schema:
          default: day
          enum:
          - day
          - week
          type: string
        style: form
      - description: "Unit for quantity values (and price values on market endpoints):\
          \ mt (default), t = US short ton, bu = commodity-specific bushels, lb, kg.\
          \ Bushel views require a single-commodity context."
        explode: true
        in: query
        name: units
        required: false
        schema:
          enum:
          - mt
          - t
          - bu
          - lb
          - kg
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PriceHistory"
          description: Time series of prices
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
      security:
      - oauth2:
        - market.read
      summary: Price history for a commodity
      tags:
      - Market
  /trades:
    get:
      operationId: tradeList
      parameters:
      - explode: true
        in: query
        name: status
        required: false
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: commodity
        required: false
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: from
        required: false
        schema:
          format: date
          type: string
        style: form
      - explode: true
        in: query
        name: to
        required: false
        schema:
          format: date
          type: string
        style: form
      - explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 20
          maximum: 50
          minimum: 1
          type: integer
        style: form
      - explode: true
        in: query
        name: offset
        required: false
        schema:
          default: 0
          minimum: 0
          type: integer
        style: form
      - description: "Unit for quantity values (and price values on market endpoints):\
          \ mt (default), t = US short ton, bu = commodity-specific bushels, lb, kg.\
          \ Bushel views require a single-commodity context."
        explode: true
        in: query
        name: units
        required: false
        schema:
          enum:
          - mt
          - t
          - bu
          - lb
          - kg
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TradePage"
          description: Paging object of trades
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
      security:
      - oauth2:
        - trades.read
      summary: The team's own trades
      tags:
      - Trades
  /trades/{id}:
    get:
      operationId: tradeGet
      parameters:
      - description: "Public trade id, e.g. trd_2Ws4."
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      - description: "Unit for quantity values (and price values on market endpoints):\
          \ mt (default), t = US short ton, bu = commodity-specific bushels, lb, kg.\
          \ Bushel views require a single-commodity context."
        explode: true
        in: query
        name: units
        required: false
        schema:
          enum:
          - mt
          - t
          - bu
          - lb
          - kg
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TradeEnvelope"
          description: Trade resource
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
      security:
      - oauth2:
        - trades.read
      summary: Get one of the team's trades
      tags:
      - Trades
  /teams:
    get:
      operationId: teamList
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamList"
          description: List of teams with roles
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
      security:
      - oauth2:
        - teams.read
      summary: Teams the user belongs to
      tags:
      - Teams
  /teams/{id}:
    get:
      operationId: teamGet
      parameters:
      - description: "Public team id, e.g. tm_5Lp8."
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamEnvelope"
          description: Team resource
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
      security:
      - oauth2:
        - teams.read
      summary: Get one team
      tags:
      - Teams
  /cash-bids:
    get:
      operationId: cashBidList
      parameters:
      - explode: true
        in: query
        name: is_active
        required: false
        schema:
          type: boolean
        style: form
      - explode: true
        in: query
        name: commodity
        required: false
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 20
          maximum: 50
          minimum: 1
          type: integer
        style: form
      - explode: true
        in: query
        name: offset
        required: false
        schema:
          default: 0
          minimum: 0
          type: integer
        style: form
      - description: "Unit for quantity values (and price values on market endpoints):\
          \ mt (default), t = US short ton, bu = commodity-specific bushels, lb, kg.\
          \ Bushel views require a single-commodity context."
        explode: true
        in: query
        name: units
        required: false
        schema:
          enum:
          - mt
          - t
          - bu
          - lb
          - kg
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CashBidPage"
          description: Paging object of cash bids
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
      security:
      - oauth2:
        - cashbids.read
      summary: The elevator's own cash bids
      tags:
      - Cash Bids
    post:
      operationId: cashBidCreate
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StoreCashBid"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CashBidEnvelope"
          description: Cash bid created
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"
      security:
      - oauth2:
        - cashbids.write
      summary: Publish a cash bid
      tags:
      - Cash Bids
  /cash-bids/{id}:
    patch:
      operationId: cashBidUpdate
      parameters:
      - description: "Public cash bid id, e.g. cb_9Xa1."
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCashBid"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CashBidEnvelope"
          description: Updated cash bid
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"
      security:
      - oauth2:
        - cashbids.write
      summary: Update a cash bid
      tags:
      - Cash Bids
  /cash-bids/{id}/offers:
    get:
      description: Offers received on one of the elevator's cash bids. The offering
        party is masked until the resulting trade is settled.
      operationId: cashBidOffers
      parameters:
      - explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      - explode: true
        in: query
        name: status
        required: false
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 20
          maximum: 50
          minimum: 1
          type: integer
        style: form
      - explode: true
        in: query
        name: offset
        required: false
        schema:
          default: 0
          minimum: 0
          type: integer
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CashBidOfferPage"
          description: Paging object of offers
