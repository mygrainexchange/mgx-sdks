name: release

# Publishes every SDK to its registry on a version tag (or a manual run). Each
# package is built from the committed generated code + overlay; nothing is
# regenerated here (regeneration + drift review happens upstream — see the
# monorepo sdk-drift workflow).
#
# Each job GRACEFULLY SKIPS publishing when its registry secret is absent, so you
# can enable registries one at a time as you set up each account/token. See
# RELEASING.md for the secrets and the release steps.

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

jobs:
  npm:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: packages/node } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", registry-url: "https://registry.npmjs.org" }
      - run: npm install --no-audit --no-fund && npm run build
      - name: Publish to npm
        env: { NODE_AUTH_TOKEN: "${{ secrets.NPM_TOKEN }}" }
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then echo "::notice::NPM_TOKEN not set — skipping npm publish"; exit 0; fi
          npm publish --access public

  pypi:
    runs-on: ubuntu-latest
    # OIDC trusted publishing — no token. Must match the PyPI trusted publisher:
    # repo mygrainexchange/mgx-sdks, workflow release.yml, environment "pypi".
    environment: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: python -m pip install build && python -m build
        working-directory: packages/python
      - name: Publish to PyPI (OIDC trusted publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/python/dist

  nuget:
    runs-on: ubuntu-latest
    # OIDC trusted publishing — no stored key. NuGet/login swaps the GitHub OIDC
    # token for a short-lived API key. Must match the nuget.org trusted-publishing
    # policy: owner mygrainexchange, repo mgx-sdks, workflow release.yml.
    environment: nuget
    permissions:
      id-token: write
      contents: read
    defaults: { run: { working-directory: packages/dotnet } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: "8.0.x" }
      - run: dotnet pack src/MyGrainExchange.Api -c Release -o out
      - name: NuGet trusted-publishing login (OIDC)
        uses: NuGet/login@v1
        id: nuget-login
        with:
          user: "${{ secrets.NUGET_USER }}"
      - name: Publish to NuGet
        run: dotnet nuget push "out/*.nupkg" --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}" -s https://api.nuget.org/v3/index.json --skip-duplicate

  maven:
    runs-on: ubuntu-latest
    # Maven Central needs the most setup (Sonatype namespace + GPG key) — see
    # RELEASING.md. Soft-fails so it never blocks the other registries.
    continue-on-error: true
    defaults: { run: { working-directory: packages/java } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: "temurin", java-version: "17" }
      - name: Publish to Maven Central
        env:
          OSSRH_USERNAME: "${{ secrets.OSSRH_USERNAME }}"
          OSSRH_PASSWORD: "${{ secrets.OSSRH_PASSWORD }}"
          MAVEN_GPG_PASSPHRASE: "${{ secrets.MAVEN_GPG_PASSPHRASE }}"
          MAVEN_GPG_KEY: "${{ secrets.MAVEN_GPG_KEY }}"
        run: |
          if [ -z "$OSSRH_USERNAME" ]; then echo "::notice::OSSRH_USERNAME not set — skipping Maven deploy"; exit 0; fi
          if [ -n "$MAVEN_GPG_KEY" ]; then echo "$MAVEN_GPG_KEY" | gpg --batch --import; fi
          mvn -q -Dmaven.test.skip=true -P sign-artifacts deploy -s ../../.github/maven-settings.xml

  # Packagist can't read a package from a subdirectory, so mirror packages/php into
  # the standalone read-only repo mygrainexchange/mgx-php (composer.json at root) on
  # each tag. Packagist points at THAT repo. Needs MGX_PHP_SPLIT_TOKEN (a PAT with
  # write access to mgx-php). Soft-fails so it never blocks the other registries.
  split-php:
    runs-on: ubuntu-latest
    continue-on-error: true
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Check for split token
        id: check
        env: { TOKEN: "${{ secrets.MGX_PHP_SPLIT_TOKEN }}" }
        run: |
          if [ -z "$TOKEN" ]; then
            echo "::notice::MGX_PHP_SPLIT_TOKEN not set — skipping PHP split"
            echo "ok=false" >> "$GITHUB_OUTPUT"
          else
            echo "ok=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Split packages/php -> mygrainexchange/mgx-php
        if: steps.check.outputs.ok == 'true'
        uses: symplify/monorepo-split-github-action@v2.3.0
        env:
          GITHUB_TOKEN: "${{ secrets.MGX_PHP_SPLIT_TOKEN }}"
        with:
          tag: ${{ github.ref_name }}
          package_directory: packages/php
          repository_organization: mygrainexchange
          repository_name: mgx-php
          user_name: MGX
          user_email: dev@mygrainexchange.com

  packagist:
    # Pings Packagist to re-read the split repo (mgx-php) after the split.
    needs: split-php
    runs-on: ubuntu-latest
    steps:
      - name: Notify Packagist
        env: { PACKAGIST_TOKEN: "${{ secrets.PACKAGIST_TOKEN }}" }
        run: |
          if [ -z "$PACKAGIST_TOKEN" ]; then echo "::notice::PACKAGIST_TOKEN not set — skipping Packagist update"; exit 0; fi
          curl -sf -XPOST -H'content-type:application/json' \
            "https://packagist.org/api/update-package?username=mygrainexchange&apiToken=${PACKAGIST_TOKEN}" \
            -d '{"repository":{"url":"https://github.com/mygrainexchange/mgx-php"}}' \
            || echo "::warning::Packagist update failed — submit https://github.com/mygrainexchange/mgx-php once at https://packagist.org/packages/submit, and confirm the username matches your Packagist account."
